<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Registration CRUD</title>

    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body{
            background-color:#f4f6f9;
            padding:20px;
        }

        .container-box{
            display:flex;
            gap:20px;
        }

        .form-section{
            width:35%;
            background:white;
            padding:20px;
            border-radius:10px;
            box-shadow:0px 0px 10px rgba(0,0,0,0.1);
        }

        .table-section{
            width:65%;
            background:white;
            padding:20px;
            border-radius:10px;
            box-shadow:0px 0px 10px rgba(0,0,0,0.1);
            overflow-x:auto;
        }

        h2,h3{
            text-align:center;
            margin-bottom:20px;
        }

        label{
            font-weight:bold;
        }
    </style>
</head>
<body>

<div class="container-box">

    <!-- Student Form -->
    <div class="form-section">

        <h2>Student Registration</h2>

        <form id="studentForm">

            <div class="mb-3">
                <label>Name</label>
                <input type="text" id="name" class="form-control" required>
            </div>

            <div class="mb-3">
                <label>Age</label>
                <input type="number" id="age" class="form-control" required>
            </div>

            <div class="mb-3">
                <label>Phone Number</label>
                <input type="tel" id="phone" class="form-control" required>
            </div>

            <div class="mb-3">
                <label>Email</label>
                <input type="email" id="email" class="form-control" required>
            </div>

            <div class="mb-3">
                <label>Address</label>
                <textarea id="address" class="form-control" rows="2"></textarea>
            </div>

            <div class="mb-3">
                <label>Gender</label>
                <select id="gender" class="form-select">
                    <option>Male</option>
                    <option>Female</option>
                    <option>Other</option>
                </select>
            </div>

            <div class="mb-3">
                <label>Department</label>
                <select id="department" class="form-select">
                    <option>CSE</option>
                    <option>ECE</option>
                    <option>EEE</option>
                    <option>Mechanical</option>
                    <option>Civil</option>
                </select>
            </div>

            <div class="mb-3">
                <label>10th Percentage</label>
                <input type="number" id="mark10" class="form-control" required>
            </div>

            <div class="mb-3">
                <label>12th Percentage</label>
                <input type="number" id="mark12" class="form-control" required>
            </div>

            <button type="button" class="btn btn-primary w-100" onclick="registerStudent()">
                Submit
            </button>

        </form>

    </div>

    <!-- Student Table -->
    <div class="table-section">

        <h3>Student Records</h3>

        <table class="table table-bordered table-striped text-center" id="studentTable">

            <thead class="table-dark">
                <tr>
                    <th>Name</th>
                    <th>Age</th>
                    <th>Phone</th>
                    <th>Email</th>
                    <th>Address</th>
                    <th>Gender</th>
                    <th>Department</th>
                    <th>10th %</th>
                    <th>12th %</th>
                    <th>Edit</th>
                    <th>Delete</th>
                </tr>
            </thead>

            <tbody>

            </tbody>

        </table>

    </div>

</div>

<script>

let selectedRow = null;

function registerStudent() {

    let name = document.getElementById("name").value;
    let age = document.getElementById("age").value;
    let phone = document.getElementById("phone").value;
    let email = document.getElementById("email").value;
    let address = document.getElementById("address").value;
    let gender = document.getElementById("gender").value;
    let department = document.getElementById("department").value;
    let mark10 = document.getElementById("mark10").value;
    let mark12 = document.getElementById("mark12").value;

    if(
        name === "" ||
        age === "" ||
        phone === "" ||
        email === "" ||
        mark10 === "" ||
        mark12 === ""
    ){
        alert("Please fill all required fields");
        return;
    }

    let table = document.getElementById("studentTable")
                        .getElementsByTagName("tbody")[0];

    if(selectedRow == null){

        let row = table.insertRow();

        row.insertCell(0).innerHTML = name;
        row.insertCell(1).innerHTML = age;
        row.insertCell(2).innerHTML = phone;
        row.insertCell(3).innerHTML = email;
        row.insertCell(4).innerHTML = address;
        row.insertCell(5).innerHTML = gender;
        row.insertCell(6).innerHTML = department;
        row.insertCell(7).innerHTML = mark10 + "%";
        row.insertCell(8).innerHTML = mark12 + "%";

        row.insertCell(9).innerHTML =
            `<button class="btn btn-warning btn-sm" onclick="editRow(this)">
                Edit
            </button>`;

        row.insertCell(10).innerHTML =
            `<button class="btn btn-danger btn-sm" onclick="deleteRow(this)">
                Delete
            </button>`;

    }
    else{

        selectedRow.cells[0].innerHTML = name;
        selectedRow.cells[1].innerHTML = age;
        selectedRow.cells[2].innerHTML = phone;
        selectedRow.cells[3].innerHTML = email;
        selectedRow.cells[4].innerHTML = address;
        selectedRow.cells[5].innerHTML = gender;
        selectedRow.cells[6].innerHTML = department;
        selectedRow.cells[7].innerHTML = mark10 + "%";
        selectedRow.cells[8].innerHTML = mark12 + "%";

        selectedRow = null;
    }

    document.getElementById("studentForm").reset();
}

function editRow(button){

    selectedRow = button.parentElement.parentElement;

    document.getElementById("name").value =
        selectedRow.cells[0].innerHTML;

    document.getElementById("age").value =
        selectedRow.cells[1].innerHTML;

    document.getElementById("phone").value =
        selectedRow.cells[2].innerHTML;

    document.getElementById("email").value =
        selectedRow.cells[3].innerHTML;

    document.getElementById("address").value =
        selectedRow.cells[4].innerHTML;

    document.getElementById("gender").value =
        selectedRow.cells[5].innerHTML;

    document.getElementById("department").value =
        selectedRow.cells[6].innerHTML;

    document.getElementById("mark10").value =
        selectedRow.cells[7].innerHTML.replace("%","");

    document.getElementById("mark12").value =
        selectedRow.cells[8].innerHTML.replace("%","");
}

function deleteRow(button){

    if(confirm("Are you sure you want to delete this record?")){

        let row = button.parentElement.parentElement;
        row.remove();

        document.getElementById("studentForm").reset();
        selectedRow = null;
    }
}

</script>

</body>
</html>
