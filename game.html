<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sudoku Game</title>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: Arial, sans-serif;
        }

        body {
            background: linear-gradient(135deg, #4facfe, #00f2fe);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .container {
            background: white;
            padding: 25px;
            border-radius: 15px;
            box-shadow: 0 0 15px rgba(0,0,0,0.2);
            text-align: center;
        }

        h1 {
            margin-bottom: 20px;
            color: #333;
        }

        .sudoku-grid {
            display: grid;
            grid-template-columns: repeat(9, 50px);
            grid-template-rows: repeat(9, 50px);
            gap: 0;
            margin: 20px auto;
        }

        .cell {
            width: 50px;
            height: 50px;
            text-align: center;
            font-size: 22px;
            border: 1px solid #999;
            outline: none;
        }

        /* Thick borders for 3x3 boxes */
        .cell:nth-child(3n) {
            border-right: 3px solid black;
        }

        .cell:nth-child(9n) {
            border-right: 1px solid #999;
        }

        .cell:nth-child(n+19):nth-child(-n+27),
        .cell:nth-child(n+46):nth-child(-n+54) {
            border-bottom: 3px solid black;
        }

        .fixed {
            background-color: #e6e6e6;
            font-weight: bold;
        }

        .wrong {
            background-color: #ffb3b3;
        }

        button {
            padding: 10px 20px;
            margin: 10px;
            border: none;
            border-radius: 8px;
            background: #007bff;
            color: white;
            cursor: pointer;
            font-size: 16px;
        }

        button:hover {
            background: #0056b3;
        }

        #message {
            margin-top: 15px;
            font-size: 18px;
            color: green;
            font-weight: bold;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>Sudoku Game</h1>

    <div class="sudoku-grid" id="grid"></div>

    <button onclick="checkSolution()">Check Solution</button>
    <button onclick="resetGame()">Reset</button>

    <div id="message"></div>
</div>

<script>
    const puzzle = [
        [5,3,0,0,7,0,0,0,0],
        [6,0,0,1,9,5,0,0,0],
        [0,9,8,0,0,0,0,6,0],
        [8,0,0,0,6,0,0,0,3],
        [4,0,0,8,0,3,0,0,1],
        [7,0,0,0,2,0,0,0,6],
        [0,6,0,0,0,0,2,8,0],
        [0,0,0,4,1,9,0,0,5],
        [0,0,0,0,8,0,0,7,9]
    ];

    const solution = [
        [5,3,4,6,7,8,9,1,2],
        [6,7,2,1,9,5,3,4,8],
        [1,9,8,3,4,2,5,6,7],
        [8,5,9,7,6,1,4,2,3],
        [4,2,6,8,5,3,7,9,1],
        [7,1,3,9,2,4,8,5,6],
        [9,6,1,5,3,7,2,8,4],
        [2,8,7,4,1,9,6,3,5],
        [3,4,5,2,8,6,1,7,9]
    ];

    const grid = document.getElementById("grid");

    function createBoard() {
        grid.innerHTML = "";

        for(let row = 0; row < 9; row++) {
            for(let col = 0; col < 9; col++) {

                const input = document.createElement("input");
                input.type = "text";
                input.maxLength = 1;
                input.classList.add("cell");

                if(puzzle[row][col] !== 0) {
                    input.value = puzzle[row][col];
                    input.disabled = true;
                    input.classList.add("fixed");
                }

                input.dataset.row = row;
                input.dataset.col = col;

                input.addEventListener("input", function() {
                    if(!/^[1-9]?$/.test(this.value)) {
                        this.value = "";
                    }
                });

                grid.appendChild(input);
            }
        }
    }

    function checkSolution() {
        const cells = document.querySelectorAll(".cell");
        let correct = true;

        cells.forEach(cell => {
            cell.classList.remove("wrong");

            let row = cell.dataset.row;
            let col = cell.dataset.col;

            if(cell.value == "") {
                correct = false;
                cell.classList.add("wrong");
            }
            else if(parseInt(cell.value) !== solution[row][col]) {
                correct = false;
                cell.classList.add("wrong");
            }
        });

        document.getElementById("message").innerText =
            correct ? "🎉 Congratulations! You solved it!" :
            "❌ Some entries are incorrect.";
    }

    function resetGame() {
        createBoard();
        document.getElementById("message").innerText = "";
    }

    createBoard();
</script>

</body>
</html>
